services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_app
    env_file:
      - .env
    volumes:
      - .:/app  # ローカルの変更をコンテナに即時反映
    ports:
      - "8000:8000" # 将来的にAPIなどを公開する場合 (任意)
    depends_on:
      milvus:
        condition: service_started
    restart: unless-stopped
    # tty: true # コンテナが即時終了するのを防ぐ (tail -f /dev/null と併用)
    # stdin_open: true # 同上

  milvus:
    image: milvusdb/milvus:v2.4.4 # イメージを v2.4.4 に戻す
    container_name: milvus_standalone
    command: ["/milvus/bin/milvus", "run", "standalone"] # 起動コマンドを明示的に指定
    ports:
      - "19530:19530" # Milvus gRPC port
      - "9091:9091"   # Milvus metrics port (optional)
    volumes:
      - ./data/milvus:/var/lib/milvus # Milvusデータ永続化
    environment:
      ETCD_USE_EMBED: "true" # スタンドアロンモードでEtcdを内包
      ETCD_DATA_DIR: "/var/lib/milvus/etcd" # Milvusデータ永続化
      COMMON_STORAGETYPE: "local" # ローカルストレージを使用
      # GPUを使用しない場合は下記を設定 (任意、環境に応じて)
      # MILVUS_GPU_ENABLED: "false"
    restart: unless-stopped

volumes:
  milvus_data: